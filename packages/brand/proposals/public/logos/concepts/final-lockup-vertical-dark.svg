<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- VERTICAL LOCKUP: Logomark above wordmark
       For hero, splash, poster, certificates.
       Full color on dark.
  -->
  <rect width="400" height="500" fill="#0F080F"/>

  <!-- Logomark — centered -->
  <ellipse cx="200" cy="180" rx="72" ry="108"
    fill="none" stroke="#9B35A8" stroke-width="28"/>
  <line x1="138" y1="272" x2="262" y2="88"
    stroke="#D49420" stroke-width="24" stroke-linecap="butt"/>

  <!-- "404" — amber, centered below mark -->
  <text x="200" y="390" font-family="'Big Shoulders Display', sans-serif" font-weight="900" font-size="96" fill="#D49420" text-anchor="middle" letter-spacing="-2">404</text>

  <!-- "TECH FOUND" — muted -->
  <text x="200" y="440" font-family="sans-serif" font-weight="500" font-size="22" fill="#766878" text-anchor="middle" letter-spacing="5">TECH FOUND</text>
</svg>
