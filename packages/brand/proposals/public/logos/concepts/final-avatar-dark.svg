<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- SOCIAL AVATAR: Optimized for circular crop.
       Mark is centered with padding so the oval doesn't get clipped
       when platforms apply a circular mask.
  -->
  <rect width="512" height="512" fill="#0F080F"/>

  <!-- The zero — slightly smaller to survive circle crop -->
  <ellipse cx="256" cy="256" rx="112" ry="168"
    fill="none" stroke="#9B35A8" stroke-width="46"/>

  <!-- The slash — amber -->
  <line x1="160" y1="400" x2="352" y2="112"
    stroke="#D49420" stroke-width="38" stroke-linecap="butt"/>
</svg>
