<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- CONCEPT E: FRAMED 404
       The typographic "404" inside a heavy brutalist border.
       Combines the proven text mark with architectural framing.
       Struck zero in amber. Border in purple.
  -->
  <rect x="0" y="0" width="512" height="512" fill="#0F080F"/>

  <!-- Heavy outer border — purple -->
  <rect x="16" y="16" width="480" height="480" fill="none" stroke="#9B35A8" stroke-width="24"/>

  <!-- "404" text -->
  <text x="48" y="350" font-family="'Big Shoulders Display', sans-serif" font-weight="900" font-size="300" fill="#9B35A8" letter-spacing="-8">4</text>
  <text x="160" y="350" font-family="'Big Shoulders Display', sans-serif" font-weight="900" font-size="300" fill="#9B35A8" letter-spacing="-8">0</text>
  <text x="280" y="350" font-family="'Big Shoulders Display', sans-serif" font-weight="900" font-size="300" fill="#9B35A8" letter-spacing="-8">4</text>

  <!-- Struck zero — amber -->
  <line x1="170" y1="345" x2="290" y2="95" stroke="#D49420" stroke-width="22" stroke-linecap="butt"/>

  <!-- "TECH FOUND" small below -->
  <text x="256" y="440" font-family="'Big Shoulders Display', sans-serif" font-weight="500" font-size="48" fill="#766878" text-anchor="middle" letter-spacing="8">TECH FOUND</text>
</svg>
